<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Portal</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .portal-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 1000px;
            width: 100%;
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .search-container {
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        #searchBar {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        #searchBar:focus {
            border-color: #667eea;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            padding: 30px;
            max-height: 60vh;
            overflow-y: auto;
        }

        .game-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
        }

        .game-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 24px rgba(102, 126, 234, 0.3);
            border-color: #667eea;
        }

        .game-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            background: #f0f0f0;
        }

        .game-card-info {
            padding: 12px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .game-card-title {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 4px;
            color: #333;
        }

        .game-card-author {
            font-size: 0.75rem;
            color: #999;
        }

        #gameViewer {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            flex-direction: column;
            animation: fadeIn 0.3s ease;
        }

        #gameViewer.active {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .game-viewer-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .game-viewer-header h2 {
            margin: 0;
        }

        .game-viewer-controls {
            display: flex;
            gap: 10px;
        }

        .game-viewer-controls button {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .game-viewer-controls button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        #gameFrame {
            flex: 1;
            border: none;
            margin: 10px;
            border-radius: 8px;
        }

        @media (max-width: 768px) {
            .games-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 15px;
                padding: 15px;
            }

            header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="portal-container">
        <header>
            <h1>🎮 Game Portal</h1>
            <p>Play awesome games right here</p>
        </header>

        <div class="search-container">
            <input 
                type="text" 
                id="searchBar" 
                placeholder="Search games..." 
                oninput="filterGames()"
            >
        </div>

        <div class="games-grid" id="gamesGrid">
            <p style="padding: 20px; text-align: center;">Loading games...</p>
        </div>
    </div>

    <div id="gameViewer">
        <div class="game-viewer-header">
            <h2 id="gameTitle">Game Title</h2>
            <div class="game-viewer-controls">
                <button onclick="closeGame()">Close</button>
            </div>
        </div>
        <iframe id="gameFrame"></iframe>
    </div>

    <script>
        let allGames = [];
        const gamesGrid = document.getElementById('gamesGrid');
        const gameViewer = document.getElementById('gameViewer');
        const gameFrame = document.getElementById('gameFrame');
        const gameTitle = document.getElementById('gameTitle');

        async function loadGames() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/GPT-Jailbreak/game-portal/main/games.json');
                const data = await response.json();
                allGames = data.games;
                displayGames(allGames);
            } catch (error) {
                gamesGrid.innerHTML = '<p style="padding: 20px; color: red;">Error loading games</p>';
                console.error('Error:', error);
            }
        }

        function displayGames(games) {
            if (games.length === 0) {
                gamesGrid.innerHTML = '<p style="padding: 20px; text-align: center;">No games found</p>';
                return;
            }

            gamesGrid.innerHTML = games.map(game => `
                <div class="game-card" onclick="openGame(${game.id})">
                    <img src="${game.cover}" alt="${game.name}">
                    <div class="game-card-info">
                        <div class="game-card-title">${game.name}</div>
                        <div class="game-card-author">by ${game.author}</div>
                    </div>
                </div>
            `).join('');
        }

        function filterGames() {
            const searchTerm = document.getElementById('searchBar').value.toLowerCase();
            const filtered = allGames.filter(game => 
                game.name.toLowerCase().includes(searchTerm)
            );
            displayGames(filtered);
        }

        function openGame(gameId) {
            const game = allGames.find(g => g.id === gameId);
            if (!game) return;

            gameTitle.textContent = game.name;
            gameFrame.src = game.url;
            gameViewer.classList.add('active');
        }

        function closeGame() {
            gameViewer.classList.remove('active');
            gameFrame.src = '';
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeGame();
            }
        });

        loadGames();
    </script>
</body>
</html>
